services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mnemosyne
      POSTGRES_PASSWORD: mnemosyne
      POSTGRES_DB: mnemosyne
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mnemosyne
      MINIO_ROOT_PASSWORD: mnemosyne-dev
    ports:
      - "9000:9000"
      - "9001:9001"
